id: moviepilot-importer
name: MoviePilot 数据导入
version: 0.1.4
description: 使用 MoviePilot 管理员账号读取数据，并通过宿主通用规则、站点、订阅和整理能力完成增量导入。
category: automation
tags: [moviepilot, import, migration]
type: cli
entry:
  darwin-arm64: bin/media-agent-plugin-moviepilot-importer-darwin-arm64
  linux-amd64: bin/media-agent-plugin-moviepilot-importer-linux-amd64
  linux-arm64: bin/media-agent-plugin-moviepilot-importer-linux-arm64
protocol: provider.v1
transport: hashicorp_go_plugin
capabilities:
  - action.run
  - action.test
  - action.status
actions:
  - id: test
    name: 检测连接
    description: 检查 MoviePilot 地址、管理员用户名和密码。
    risk: low
  - id: sync
    name: 同步并导入
    description: 增量导入规则设置、站点、订阅和整理历史，保留订阅历史快照；不迁移历史下载。
    risk: high
  - id: status
    name: 查看状态
    description: 查看插件私有暂存数据和最近应用状态。
    risk: low
permissions:
  network:
    - configured:base_url
  secrets:
    - plugin.moviepilot.password
  data:
    - storage
  host:
    - rules.read
    - rules.write
    - site.accounts.write
    - subscriptions.write
    - transfers.write
resources:
  memory_limit_mb: 128
  idle_timeout_seconds: 60
