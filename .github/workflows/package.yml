name: Package Plugins

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  PLUGINS: drive115 browser-emulator
  PLATFORMS: darwin-arm64 linux-amd64 linux-arm64

jobs:
  package:
    name: Test and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Resolve package plan
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          BEFORE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        shell: bash
        run: |
          set -euo pipefail

          full_snapshot=0
          base_ref=""
          reuse_release_tag=""

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            full_snapshot=1
            while IFS= read -r candidate; do
              if [ -n "$candidate" ] && [ "$candidate" != "$GITHUB_REF_NAME" ]; then
                reuse_release_tag="$candidate"
                break
              fi
            done < <(gh release list --limit 100 --json tagName --jq '.[].tagName')
            base_ref="$reuse_release_tag"
          elif [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            base_ref="$PR_BASE_SHA"
          elif [ "$GITHUB_EVENT_NAME" = "push" ]; then
            base_ref="$BEFORE_SHA"
          else
            base_ref="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi

          build_plugins="$(
            BASE_REF="$base_ref" \
            FULL_SNAPSHOT="$full_snapshot" \
            REUSE_RELEASE_TAG="$reuse_release_tag" \
            PLATFORMS="$PLATFORMS" \
            ./scripts/prepare-package.sh $PLUGINS
          )"

          if [ -n "$build_plugins" ]; then
            has_builds=true
          else
            has_builds=false
          fi

          {
            echo "build_plugins=$build_plugins"
            echo "has_builds=$has_builds"
            echo "full_snapshot=$full_snapshot"
            echo "base_ref=$base_ref"
            echo "reuse_release_tag=$reuse_release_tag"
          } >> "$GITHUB_OUTPUT"

          echo "base_ref=${base_ref:-<none>}"
          echo "reuse_release_tag=${reuse_release_tag:-<none>}"
          echo "build_plugins=${build_plugins:-<none>}"

      - name: Package changed plugins
        if: steps.plan.outputs.has_builds == 'true'
        env:
          BUILD_PLUGINS: ${{ steps.plan.outputs.build_plugins }}
        run: PLATFORMS="$PLATFORMS" ./scripts/package.sh $BUILD_PLUGINS

      - name: Package complete plugin catalog
        run: ./scripts/package-manifests.sh $PLUGINS

      - name: Verify package matrix
        shell: bash
        run: |
          set -euo pipefail

          archive_plugins="${{ steps.plan.outputs.build_plugins }}"
          if [ "${{ steps.plan.outputs.full_snapshot }}" = "1" ]; then
            archive_plugins="$PLUGINS"
          fi

          for plugin in $archive_plugins; do
            version="$(awk '$1 == "version:" { gsub(/"/, "", $2); print $2; exit }' "$plugin/plugin.yaml")"
            if [ -z "$version" ]; then
              echo "::error file=$plugin/plugin.yaml::missing version"
              exit 1
            fi

            for platform in $PLATFORMS; do
              archive="dist/$plugin-v$version-$platform.tar.gz"
              if [ ! -s "$archive" ]; then
                echo "::error::missing package $archive"
                exit 1
              fi

              binary="$plugin/bin/media-agent-plugin-$plugin-$platform"
              # Consume the full tar listing: grep -q can SIGPIPE GNU tar under pipefail.
              if ! tar -tzf "$archive" | grep -Fx "$binary" >/dev/null; then
                echo "::error file=$archive::missing $binary"
                exit 1
              fi
            done
          done

          if [ ! -s dist/manifests.tar.gz ]; then
            echo "::error::missing dist/manifests.tar.gz"
            exit 1
          fi
          for plugin in $PLUGINS; do
            if ! tar -tzf dist/manifests.tar.gz | grep -Fx "$plugin/plugin.yaml" >/dev/null; then
              echo "::error file=dist/manifests.tar.gz::missing $plugin/plugin.yaml"
              exit 1
            fi
          done

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: media-agent-plugin-packages
          path: dist/*.tar.gz
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --verify-tag --generate-notes
          gh release upload "$TAG_NAME" dist/*.tar.gz --clobber

      - name: Notify Media Agent Cloud
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        shell: bash
        run: |
          payload="$(printf '{"repo_url":"%s"}' "$REPO_URL")"
          if ! curl --silent --fail \
            --connect-timeout 5 \
            --max-time 120 \
            --header 'Content-Type: application/json' \
            --data "$payload" \
            'https://mac.s.puzizi.cn/api/v1/plugins/repositories/check-updates'; then
            echo '::notice::Media Agent Cloud 更新通知失败，插件发布不受影响。'
          fi
          exit 0
